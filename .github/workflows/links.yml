name: Check links

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 9 * * 1'  # Every Monday 9am UTC

jobs:
  check-links:
    name: Check links
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: lycheeverse/lychee-action@v2
        with:
          args: >
            --verbose
            --no-progress
            --config .lychee.toml
            '**/*.md'
          fail: true
